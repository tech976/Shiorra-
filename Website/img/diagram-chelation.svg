<svg xmlns="http://www.w3.org/2000/svg" width="700" height="560" viewBox="0 0 700 560" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="ironCore" cx="0.4" cy="0.4" r="0.65">
      <stop offset="0%"   stop-color="#E83A86"/>
      <stop offset="50%"  stop-color="#C2185B"/>
      <stop offset="100%" stop-color="#8E1948"/>
    </radialGradient>
    <radialGradient id="atomGrey" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%"   stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </radialGradient>
    <radialGradient id="atomWhite" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E5E5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="560" fill="#FFFFFF"/>
  <rect x="36" y="36" width="628" height="488" rx="16" fill="#FBE5EE"/>

  <!-- Decorative protective ring -->
  <circle cx="350" cy="280" r="180" fill="none" stroke="#C2185B" stroke-width="1" stroke-dasharray="3 6" opacity="0.25"/>
  <circle cx="350" cy="280" r="155" fill="none" stroke="#C2185B" stroke-width="1" opacity="0.10"/>

  <!-- ====================== GLYCINE 1 (top-left) ====================== -->
  <g transform="translate(220 145)">
    <!-- N atom -->
    <circle cx="0"  cy="0"   r="18" fill="url(#atomGrey)"/>
    <text x="0" y="4" text-anchor="middle" fill="#FFF" font-size="13" font-weight="700">N</text>
    <text x="-26" y="-22" font-size="9" font-weight="700" fill="#1F1F1F" letter-spacing="2">NH₂</text>

    <!-- Bond to C -->
    <line x1="14" y1="14" x2="44" y2="44" stroke="#1F1F1F" stroke-width="2.5"/>

    <!-- C atom -->
    <circle cx="58"  cy="58" r="16" fill="url(#atomGrey)"/>
    <text x="58" y="62" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700">C</text>

    <!-- Bond to COO -->
    <line x1="71" y1="71" x2="100" y2="100" stroke="#1F1F1F" stroke-width="2.5"/>

    <!-- O atom (carboxylate) -->
    <circle cx="115" cy="115" r="14" fill="url(#atomWhite)" stroke="#1F1F1F" stroke-width="1.4"/>
    <text x="115" y="119" text-anchor="middle" fill="#1F1F1F" font-size="10" font-weight="700">O</text>
    <text x="135" y="142" font-size="9" font-weight="700" fill="#1F1F1F" letter-spacing="2">COO⁻</text>
  </g>

  <!-- Bond from glycine 1 to Fe -->
  <line x1="335" y1="260" x2="305" y2="278" stroke="#C2185B" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- ====================== IRON CORE ====================== -->
  <g transform="translate(350 280)">
    <circle r="64" fill="url(#ironCore)"/>
    <circle r="64" fill="none" stroke="#9E1349" stroke-width="2"/>
    <text y="-2" text-anchor="middle" fill="#FFF" font-size="32" font-weight="700">Fe</text>
    <text y="20" text-anchor="middle" fill="#FFF" font-size="9" font-weight="700" letter-spacing="2.5" opacity="0.9">FERROUS · 27 mg</text>
  </g>

  <!-- Bond from Fe to glycine 2 -->
  <line x1="365" y1="302" x2="395" y2="320" stroke="#C2185B" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- ====================== GLYCINE 2 (bottom-right) ====================== -->
  <g transform="translate(480 415) scale(-1 -1)">
    <circle cx="0"  cy="0"   r="18" fill="url(#atomGrey)"/>
    <text x="0" y="4" text-anchor="middle" fill="#FFF" font-size="13" font-weight="700" transform="scale(-1 -1)">N</text>
    <line x1="14" y1="14" x2="44" y2="44" stroke="#1F1F1F" stroke-width="2.5"/>
    <circle cx="58"  cy="58" r="16" fill="url(#atomGrey)"/>
    <text x="58" y="62" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700" transform="scale(-1 -1)">C</text>
    <line x1="71" y1="71" x2="100" y2="100" stroke="#1F1F1F" stroke-width="2.5"/>
    <circle cx="115" cy="115" r="14" fill="url(#atomWhite)" stroke="#1F1F1F" stroke-width="1.4"/>
    <text x="115" y="119" text-anchor="middle" fill="#1F1F1F" font-size="10" font-weight="700" transform="scale(-1 -1)">O</text>
  </g>
  <text x="394" y="460" font-size="9" font-weight="700" fill="#1F1F1F" letter-spacing="2">COO⁻</text>
  <text x="490" y="376" font-size="9" font-weight="700" fill="#1F1F1F" letter-spacing="2">NH₂</text>

  <!-- ====================== LABELS ====================== -->
  <text x="350" y="76" text-anchor="middle" fill="#1F1F1F" font-size="13" font-weight="700" letter-spacing="3">FERROUS BISGLYCINATE · Fe(C₂H₄NO₂)₂</text>
  <text x="350" y="96" text-anchor="middle" fill="#6B6B6B" font-size="11" font-weight="500">A chelated iron — protected by two glycine amino acids</text>

  <text x="350" y="498" text-anchor="middle" fill="#1F1F1F" font-size="11" font-weight="700" letter-spacing="2">PROTECTED FROM PHYTATES · ABSORBED INTACT IN THE GUT</text>
</svg>
