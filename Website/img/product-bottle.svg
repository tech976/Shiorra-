<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2A6840"/>
      <stop offset="55%"  stop-color="#205030"/>
      <stop offset="100%" stop-color="#15391F"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-15%" width="160%" height="135%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="36" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="300" cy="765" rx="200" ry="14" fill="#000" opacity="0.10"/>

  <g filter="url(#softShadow)">
    <!-- Body -->
    <path d="M170 220
             Q170 188 204 188
             L396 188
             Q430 188 430 220
             L430 700
             Q430 745 385 745
             L215 745
             Q170 745 170 700 Z"
          fill="url(#body)"/>

    <!-- Neck -->
    <rect x="240" y="135" width="120" height="58" rx="6" fill="#205030"/>

    <!-- Cap -->
    <rect x="226" y="80" width="148" height="62" rx="10" fill="url(#cap)"/>
    <rect x="226" y="88" width="148" height="2.5" fill="#000" opacity="0.35"/>
    <rect x="226" y="130" width="148" height="2.5" fill="#000" opacity="0.35"/>

    <!-- Label (white) -->
    <rect x="195" y="290" width="210" height="380" rx="3" fill="#FFFFFF"/>

    <!-- Top band -->
    <rect x="195" y="290" width="210" height="58" fill="#1F1F1F"/>
    <text x="300" y="326" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700"
          font-size="20" fill="#FFFFFF" letter-spacing="6">SHIŌRRA</text>

    <!-- Product title -->
    <text x="300" y="402" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700"
          font-size="32" fill="#1F1F1F">Hematinic</text>
    <text x="300" y="438" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="400" font-style="italic"
          font-size="32" fill="#1F1F1F">Support</text>

    <!-- Hairline divider -->
    <line x1="245" y1="464" x2="355" y2="464" stroke="#205030" stroke-width="1.2"/>

    <!-- Ingredients -->
    <text x="300" y="498" text-anchor="middle"
          font-family="Inter, Arial, sans-serif" font-weight="500"
          font-size="11" fill="#444444" letter-spacing="3">IRON · FOLATE · B12</text>

    <!-- Capsule mark -->
    <g transform="translate(260 530)">
      <rect x="0" y="0" width="80" height="28" rx="14" fill="#205030"/>
      <rect x="0" y="0" width="40" height="28" rx="14" fill="#15391F"/>
      <circle cx="60" cy="14" r="3" fill="#FFFFFF" opacity="0.8"/>
    </g>

    <!-- Course -->
    <text x="300" y="608" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700"
          font-size="11" fill="#1F1F1F" letter-spacing="3">30 CAPSULES · 30 DAYS</text>

    <!-- Cert pill -->
    <rect x="225" y="625" width="150" height="20" rx="10" fill="#205030"/>
    <text x="300" y="639" text-anchor="middle"
          font-family="Inter, Arial, sans-serif" font-weight="700"
          font-size="10" fill="#FFFFFF" letter-spacing="3">PRESERVATIVE-FREE</text>

    <!-- "EST. K.C. LABORATORIES" -->
    <text x="300" y="662" text-anchor="middle"
          font-family="Helvetica, Arial, sans-serif" font-weight="500"
          font-size="8" fill="#888888" letter-spacing="3">EST. K.C. LABORATORIES</text>

    <!-- Body shine -->
    <path d="M188 250 Q183 460 224 680 L236 680 Q200 460 208 250 Z"
          fill="url(#shine)" opacity="0.85"/>
  </g>
</svg>
