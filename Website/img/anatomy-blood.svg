<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <!-- Anemic vessel gradient -->
    <linearGradient id="vesselA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE5EE"/>
      <stop offset="100%" stop-color="#F4D8E2"/>
    </linearGradient>
    <!-- Healthy vessel gradient -->
    <linearGradient id="vesselH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FBE5EE"/>
    </linearGradient>
    <!-- Anemic RBC: pale, smaller -->
    <radialGradient id="rbcA" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%"  stop-color="#F4B7C8"/>
      <stop offset="55%" stop-color="#EFA0B6"/>
      <stop offset="100%" stop-color="#E08FA8"/>
    </radialGradient>
    <!-- Healthy RBC: vibrant, biconcave -->
    <radialGradient id="rbcH" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%"  stop-color="#D63273"/>
      <stop offset="55%" stop-color="#C2185B"/>
      <stop offset="100%" stop-color="#9E1349"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#FFFFFF"/>

  <!-- ====================== LEFT — ANEMIC ====================== -->
  <g transform="translate(60 80)">
    <!-- Vessel container -->
    <rect width="350" height="400" rx="36" fill="url(#vesselA)"/>
    <rect width="350" height="400" rx="36" fill="none" stroke="#E0B8C8" stroke-width="1.5"/>

    <!-- Sparse RBCs (anemic = ~5 cells, pale) -->
    <!-- Each RBC: outer disc + inner darker concavity ring -->
    <g>
      <ellipse cx="100" cy="80"  rx="34" ry="24" fill="url(#rbcA)"/>
      <ellipse cx="100" cy="80"  rx="13" ry="9"  fill="#E69CB1" opacity="0.7"/>

      <ellipse cx="240" cy="140" rx="34" ry="24" fill="url(#rbcA)"/>
      <ellipse cx="240" cy="140" rx="13" ry="9"  fill="#E69CB1" opacity="0.7"/>

      <ellipse cx="120" cy="240" rx="34" ry="24" fill="url(#rbcA)"/>
      <ellipse cx="120" cy="240" rx="13" ry="9"  fill="#E69CB1" opacity="0.7"/>

      <ellipse cx="250" cy="320" rx="34" ry="24" fill="url(#rbcA)"/>
      <ellipse cx="250" cy="320" rx="13" ry="9"  fill="#E69CB1" opacity="0.7"/>
    </g>

    <!-- Vessel inner wall hairlines -->
    <line x1="14" y1="20" x2="14" y2="380" stroke="#E0B8C8" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="336" y1="20" x2="336" y2="380" stroke="#E0B8C8" stroke-width="1" stroke-dasharray="2 4"/>
  </g>

  <!-- Left labels -->
  <g font-size="11" fill="#1F1F1F" font-weight="700" letter-spacing="3">
    <text x="60" y="56" text-anchor="start">ANEMIC BLOOD</text>
    <text x="408" y="56" text-anchor="end" fill="#6B6B6B" font-weight="500" letter-spacing="1.5">Hb &lt; 11 g/dL</text>
  </g>

  <!-- Anatomical pointer (left) -->
  <g stroke="#1F1F1F" stroke-width="1" fill="none">
    <path d="M 134 160 L 184 100 L 230 100"/>
  </g>
  <g font-family="Helvetica" fill="#1F1F1F">
    <text x="234" y="96" font-size="10.5" font-weight="700">Pale RBC</text>
    <text x="234" y="110" font-size="10" fill="#6B6B6B" font-weight="500">low haemoglobin · ↓ oxygen</text>
  </g>

  <!-- Bottom caption (left) -->
  <text x="234" y="510" text-anchor="middle" font-size="11" font-weight="500" fill="#6B6B6B">Sparse, pale red blood cells. Reduced oxygen delivery.</text>


  <!-- ====================== CENTRE TRANSFORM ARROW ====================== -->
  <g transform="translate(450 280)">
    <line x1="-32" y1="0" x2="32" y2="0" stroke="#1F1F1F" stroke-width="1.4" stroke-dasharray="3 4"/>
    <circle r="22" fill="#1F1F1F"/>
    <text y="5" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">→</text>
    <text y="56" text-anchor="middle" fill="#C2185B" font-size="9" font-weight="700" letter-spacing="2">SHIŌRRA</text>
    <text y="70" text-anchor="middle" fill="#6B6B6B" font-size="8" font-weight="500" letter-spacing="1.5">FERROUS BISGLYCINATE</text>
  </g>


  <!-- ====================== RIGHT — IRON-REPLENISHED ====================== -->
  <g transform="translate(490 80)">
    <!-- Vessel container -->
    <rect width="350" height="400" rx="36" fill="url(#vesselH)"/>
    <rect width="350" height="400" rx="36" fill="none" stroke="#E0B8C8" stroke-width="1.5"/>

    <!-- Plentiful, vibrant RBCs (healthy = many cells, deep pink, biconcave) -->
    <g>
      <ellipse cx="80"  cy="60"  rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="80"  cy="60"  rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="180" cy="100" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="180" cy="100" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="270" cy="60"  rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="270" cy="60"  rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="60"  cy="160" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="60"  cy="160" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="160" cy="200" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="160" cy="200" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="280" cy="170" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="280" cy="170" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="80"  cy="270" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="80"  cy="270" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="200" cy="290" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="200" cy="290" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="290" cy="280" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="290" cy="280" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="100" cy="350" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="100" cy="350" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>

      <ellipse cx="220" cy="370" rx="32" ry="22" fill="url(#rbcH)"/>
      <ellipse cx="220" cy="370" rx="11" ry="7"  fill="#9E1349" opacity="0.7"/>
    </g>

    <!-- Oxygen molecules (small teal dots scattered between cells) -->
    <g fill="#3DBDB6" opacity="0.85">
      <circle cx="120" cy="40"  r="2.4"/>
      <circle cx="220" cy="80"  r="2.4"/>
      <circle cx="60"  cy="120" r="2.4"/>
      <circle cx="240" cy="140" r="2.4"/>
      <circle cx="120" cy="240" r="2.4"/>
      <circle cx="240" cy="240" r="2.4"/>
      <circle cx="40"  cy="320" r="2.4"/>
      <circle cx="160" cy="330" r="2.4"/>
      <circle cx="290" cy="340" r="2.4"/>
    </g>

    <!-- Vessel inner wall hairlines -->
    <line x1="14" y1="20" x2="14" y2="380" stroke="#E0B8C8" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="336" y1="20" x2="336" y2="380" stroke="#E0B8C8" stroke-width="1" stroke-dasharray="2 4"/>
  </g>

  <!-- Right labels -->
  <g font-size="11" font-weight="700" letter-spacing="3">
    <text x="490" y="56" text-anchor="start" fill="#C2185B">IRON-REPLENISHED</text>
    <text x="838" y="56" text-anchor="end" fill="#6B6B6B" font-weight="500" letter-spacing="1.5">Hb ≥ 12 g/dL</text>
  </g>

  <!-- Anatomical pointers (right) -->
  <g stroke="#1F1F1F" stroke-width="1" fill="none">
    <path d="M 760 250 L 810 220 L 850 220"/>
  </g>
  <g font-family="Helvetica" fill="#1F1F1F">
    <text x="850" y="216" text-anchor="end" font-size="10.5" font-weight="700">Vibrant RBC</text>
    <text x="850" y="230" text-anchor="end" font-size="10" fill="#6B6B6B" font-weight="500">rich in haemoglobin</text>
  </g>

  <g stroke="#3DBDB6" stroke-width="1" fill="none">
    <path d="M 700 110 L 750 80 L 850 80"/>
  </g>
  <g font-family="Helvetica" fill="#1F1F1F">
    <text x="850" y="76" text-anchor="end" font-size="10.5" font-weight="700">Oxygen (O₂)</text>
    <text x="850" y="90" text-anchor="end" font-size="10" fill="#6B6B6B" font-weight="500">delivered to tissues</text>
  </g>

  <!-- Bottom caption (right) -->
  <text x="664" y="510" text-anchor="middle" font-size="11" font-weight="500" fill="#6B6B6B">Abundant, vibrant RBCs. Optimal oxygen delivery.</text>
</svg>
