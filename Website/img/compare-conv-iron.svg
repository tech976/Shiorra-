<svg xmlns="http://www.w3.org/2000/svg" width="200" height="240" viewBox="0 0 200 240" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="ironBottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#C8C8D0"/>
      <stop offset="100%" stop-color="#9A9AA3"/>
    </linearGradient>
  </defs>
  <!-- Bottle body -->
  <rect x="56" y="50" width="88" height="170" rx="4" fill="url(#ironBottle)"/>
  <!-- Cap -->
  <rect x="62" y="36" width="76" height="22" rx="2" fill="#5C5C66"/>
  <rect x="62" y="40" width="76" height="2" fill="#3A3A42" opacity="0.4"/>
  <!-- Label -->
  <rect x="64" y="80" width="72" height="100" fill="#FAFAFA"/>
  <rect x="64" y="80" width="72" height="20" fill="#A03030"/>
  <text x="100" y="94" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700" letter-spacing="1">IRON</text>
  <text x="100" y="116" text-anchor="middle" fill="#1F1F1F" font-size="10" font-weight="700">FERROUS</text>
  <text x="100" y="128" text-anchor="middle" fill="#1F1F1F" font-size="10" font-weight="700">SULFATE</text>
  <text x="100" y="148" text-anchor="middle" fill="#6B6B6B" font-size="7">325 mg</text>
  <text x="100" y="160" text-anchor="middle" fill="#6B6B6B" font-size="6">100 tablets</text>
  <text x="100" y="172" text-anchor="middle" fill="#6B6B6B" font-size="6">Dietary supplement</text>
</svg>
