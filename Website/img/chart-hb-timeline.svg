<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="960" height="480" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="50" fill="#1F1F1F" font-size="11" font-weight="700" letter-spacing="3">EXPECTED HEMOGLOBIN RESPONSE OVER TIME</text>
  <text x="900" y="50" text-anchor="end" fill="#6B6B6B" font-size="10" font-weight="500" font-style="italic">Source · Bumrungpert A et al. Nutrients 2022 · Shata A. AJMMS 2014</text>
  <line x1="60" y1="62" x2="900" y2="62" stroke="#1F1F1F" stroke-width="1"/>

  <!-- Y axis: 9 to 13 g/dL -->
  <g stroke="#E5E5E5" stroke-width="1">
    <line x1="100" y1="120" x2="900" y2="120"/>
    <line x1="100" y1="200" x2="900" y2="200"/>
    <line x1="100" y1="280" x2="900" y2="280"/>
    <line x1="100" y1="360" x2="900" y2="360" stroke="#1F1F1F" stroke-width="1.4"/>
  </g>

  <g fill="#6B6B6B" font-size="11" font-weight="600">
    <text x="92" y="364" text-anchor="end">9</text>
    <text x="92" y="284" text-anchor="end">10</text>
    <text x="92" y="204" text-anchor="end">11</text>
    <text x="92" y="124" text-anchor="end">12</text>
    <text x="92" y="84"  text-anchor="end">13</text>
  </g>
  <text x="40" y="240" text-anchor="middle" fill="#1F1F1F" font-size="10" font-weight="700" letter-spacing="2.5"
        transform="rotate(-90 40 240)">Hb (g/dL)</text>

  <!-- WHO threshold line at 12 g/dL (y=120) -->
  <line x1="100" y1="120" x2="900" y2="120" stroke="#C2185B" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.55"/>
  <text x="900" y="112" text-anchor="end" fill="#C2185B" font-size="10" font-weight="700" letter-spacing="2.5">WHO PREGNANCY THRESHOLD · 12 g/dL</text>

  <!-- Data positions:
       Week 0   x=160  Hb 10.0 → y=280
       1-4 wks  x=320  Hb 10.5 → y=240
       6-8 wks  x=480  Hb 11.4 → y=168
       3 mo     x=660  Hb 12.4 → y=88
       4-6 mo   x=840  Hb 12.8 → y=56
  -->

  <!-- Filled area under curve -->
  <path d="M 160 280 L 320 240 L 480 168 L 660 88 L 840 56 L 840 360 L 160 360 Z"
        fill="#C2185B" opacity="0.08"/>

  <!-- Connecting line -->
  <path d="M 160 280 L 320 240 L 480 168 L 660 88 L 840 56"
        fill="none" stroke="#1F1F1F" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Data dots -->
  <g>
    <circle cx="160" cy="280" r="8" fill="#1F1F1F"/>
    <circle cx="160" cy="280" r="3.5" fill="#FFFFFF"/>
    <circle cx="320" cy="240" r="8" fill="#1F1F1F"/>
    <circle cx="320" cy="240" r="3.5" fill="#FFFFFF"/>
    <circle cx="480" cy="168" r="8" fill="#1F1F1F"/>
    <circle cx="480" cy="168" r="3.5" fill="#FFFFFF"/>
    <circle cx="660" cy="88" r="10" fill="#C2185B"/>
    <circle cx="660" cy="88" r="4.5" fill="#FFFFFF"/>
    <circle cx="840" cy="56" r="10" fill="#C2185B"/>
    <circle cx="840" cy="56" r="4.5" fill="#FFFFFF"/>
  </g>

  <!-- Hb values above dots -->
  <g fill="#1F1F1F" font-size="13" font-weight="700" letter-spacing="-0.5">
    <text x="160" y="266" text-anchor="middle">10.0</text>
    <text x="320" y="226" text-anchor="middle">10.5</text>
    <text x="480" y="154" text-anchor="middle">11.4</text>
    <text x="660" y="74" text-anchor="middle" fill="#C2185B">12.4</text>
    <text x="840" y="42" text-anchor="middle" fill="#C2185B">12.8</text>
  </g>

  <!-- X axis milestones -->
  <g fill="#1F1F1F" font-size="10.5" font-weight="700" letter-spacing="2.5">
    <text x="160" y="388" text-anchor="middle">WEEK 0</text>
    <text x="320" y="388" text-anchor="middle">1–4 WEEKS</text>
    <text x="480" y="388" text-anchor="middle">6–8 WEEKS</text>
    <text x="660" y="388" text-anchor="middle" fill="#C2185B">3 MONTHS</text>
    <text x="840" y="388" text-anchor="middle" fill="#C2185B">4–6 MONTHS</text>
  </g>
  <g fill="#6B6B6B" font-size="10" font-weight="500">
    <text x="160" y="406" text-anchor="middle">Baseline</text>
    <text x="320" y="406" text-anchor="middle">Hb starts rising</text>
    <text x="480" y="406" text-anchor="middle">Steady rise</text>
    <text x="660" y="406" text-anchor="middle" fill="#1F1F1F" font-weight="700">Stabilised</text>
    <text x="840" y="406" text-anchor="middle" fill="#1F1F1F" font-weight="700">Full correction</text>
  </g>
</svg>
